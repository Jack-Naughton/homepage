{% extends 'accounts/base_logged_in.html' %}
{% load tailwind_filters %}
{% block base_main %}
    <div class="flex items-center justify-center h-screen w-full">
        <div class="md:w-1/3">
            <form method="POST">
                {% csrf_token %}
                {{ form|crispy }}
                <div class="flex items-center justify-between">
                    <button
                            type="submit"
                            name="sumbit"
                            class="px-4 py-2 font-semibold text-sm bg-sky-600 hover:bg-sky-700 text-white rounded-full"
                    >
                        Submit
                    </button>
                    <a href="{% url 'profile' %}">Cancel</a>
                </div>
            </form>
        </div>
    </div>
{% endblock base_main %}
