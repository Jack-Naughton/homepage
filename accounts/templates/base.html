{% load static tailwind_tags %}
<!doctype html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="X-UA-Compatible" content="ie=edge">
    {% tailwind_preload_css %}
    {% tailwind_css %}
    <title>{% block title %}My Account{% endblock %}</title>
    {# Remove the curtain now that all above is loaded #}
    <style>#loadOverlay{display: none;}</style>
</head>
<body class="bg-gray-50 leading-normal tracking-normal">
{# Here to block the screen while css is loading #}
<div id="loadOverlay" style="background-color:rgb(249 250 251 / var(--tw-bg-opacity)); position:absolute; top:0; left:0; width:100%; height:100%; z-index:2000;"></div>
{% block body_content %}{% endblock %}
</body>
</html>
