{% extends 'registration/base_registration.html' %}
{% load tailwind_filters %}
{% block title %}Signup{% endblock title %}

{% block content %}
    <div class="flex items-center justify-center h-screen">
        <div class="md:w-1/3">
            <form method="POST">
                {% csrf_token %}
                {{ form|crispy }}
                <button
                        type="submit"
                        name="sumbit"
                        class="px-4 py-2 font-semibold text-sm bg-sky-600 hover:bg-sky-700 text-white rounded-full"
                >Submit</button>
            </form>
            <br>
            <p>Have an account? <a href="/accounts/login" class="text-sky-600">Click Here</a></p>
        </div>
    </div>
{% endblock content %}
