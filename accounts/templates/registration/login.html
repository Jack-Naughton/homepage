{% extends 'registration/base_registration.html' %}
{% load crispy_forms_filters %}
{% block title %}Login{% endblock title %}

{% block content %}
    <section class="flex items-center justify-center h-screen">
        <div class="md:w-1/3">
            <form method="POST">
                {% csrf_token %}
                {{ form|crispy }}
                <button
                        type="submit"
                        name="sumbit"
                        class="px-4 py-2 font-semibold text-sm bg-sky-600 hover:bg-sky-700 text-white rounded-full"
                >Submit</button>
            </form>
            <br>
            <p>Need an account? <a href="/accounts/signup" class="text-sky-600">Click Here</a></p>
        </div>
    </section>
    <style>
        .asteriskField {
            display: none;
        }
    </style>
{% endblock content %}
