{% extends 'registration/base_registration.html' %}
{% load crispy_forms_filters %}
{% block title %}Login{% endblock title %}

{% block content %}
    <section class="flex items-center justify-center h-screen">
        <div class="">
            <h3 class="">Sign in</h3>
            <form method="POST">
                {% csrf_token %}
                {{ form|crispy }}
                <input
                        type="submit"
                        name="sumbit"
                        class="px-4 py-2 font-semibold text-sm bg-b text-white rounded-full shadow-sm"
                >
            </form>
            <br>
            <p>Need an account? <a href="/accounts/signup">Click Here</a></p>
        </div>
    </section>
    <style>
        .asteriskField {
            display: none;
        }
    </style>
{% endblock content %}
